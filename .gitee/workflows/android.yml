name: Build Android APK

on:
  push:
    branches: [master]
  schedule:
    - cron: '0 2 * * *'  # 每天凌晨2点自动构建
  workflow_dispatch:  # 手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build debug APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SalaryTracker-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload to Release
        if: github.ref == 'refs/heads/master'
        run: |
          APK_FILE=app/build/outputs/apk/debug/app-debug.apk
          curl -X POST \
            -H "Authorization: token ${{ secrets.GITEE_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"tag_name":"v1.0","name":"Build ${{ github.run_number }}","assets":[{"name":"app-debug.apk","url":"https://gitee.com/api/v5/repos/sting1023/SalaryTracker/releases/upload_file?access_token=${{ secrets.GITEE_TOKEN }}"}]}' \
            "https://gitee.com/api/v5/repos/sting1023/SalaryTracker/releases"
